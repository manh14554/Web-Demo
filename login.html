<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Swag Labs Login</title>
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header-center">
      <a href="./index.html" class="logo-login">Swag <span>Labs</span></a>
    </div>

    <main class="container">
      <div class="login-wrapper">
        
        <div class="panel">
          <form action="./index.html" data-mode="login">     
              <input name="username" type="text" placeholder="Username" required/>
              <input name="password" type="password" placeholder="Password" required />
            <div class="row">
              <button class="btn" type="submit">Login</button>
            </div>
          </form>
        </div>

          <div class="credentials-info">
            <div class="info-section-login">
              <h4>Accepted usernames:</h4>
              <ul class="user-list">
                <li>standard_user</li>
                <li>locked_out_user</li>
                <li>problem_user</li>
                <li>performance_glitch_user</li>
              </ul>
            </div>

            <div class="info-section-login">
              <h4>Password for all users:</h4>
              <ul class="password-list">
                <li>secret_swag</li>
              </ul>
            </div>
          </div>

      </div> 
    </main>
    
    <footer class="footer-copyright">
      <p>© 2023 Swag Labs. All Rights Reserved. Terms of Service | Privacy Policy</p>
    </footer>
    
  </body>
</html>
