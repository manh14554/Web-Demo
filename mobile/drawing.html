<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>

        /* ══════════════════════════════════════════
           BASE — Mobile-first (≤ 390px reference)
           Khớp với body.drawing-page trong style.css
        ══════════════════════════════════════════ */

        body.drawing-page {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Shell: chiều rộng bám sát thiết bị, tối đa 390px */
        body.drawing-page .drawing-shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            min-height: 100dvh;
            height: auto;
            background: #ffffff;
            overflow: visible;
            box-sizing: border-box;
        }

        /* Header */
        body.drawing-page .drawing-mobile-header {
            width: 100%;
            height: 96px;
            padding: 32px 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #EDEDED;
            box-sizing: border-box;
            background: #ffffff;
            flex-shrink: 0;
        }

        body.drawing-page .drawing-mobile-brand {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 18px;
            line-height: 40px;
            letter-spacing: 0.02em;
            color: #132322;
        }

        body.drawing-page .drawing-mobile-brand strong { font-weight: 600; }
        body.drawing-page .drawing-mobile-brand span   { font-weight: 400; }

        /* Main: flex column, chiếm phần còn lại */
        body.drawing-page .drawing-main {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 16px 88px;
            box-sizing: border-box;
        }

        /* Tiêu đề trang */
        body.drawing-page .drawing-page-title {
            position: static;
            width: auto;
            height: auto;
            margin: 0;
            font-family: 'Noto Sans', sans-serif;
            font-weight: 700;
            font-size: 24px;
            line-height: 32px;
            letter-spacing: 0.02em;
            color: #132322;
        }

        /* Wrapper bao canvas */
        body.drawing-page .drawing-blueprint-wrapper {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex: 1 0 auto;
            overflow: hidden;
            padding: 0;
        }

        /* Blueprint = khung chứa canvas */
        body.drawing-page .drawing-blueprint {
            position: relative;
            width: 100%;
            /* Canvas chiếm không gian còn lại sau header + title + actions + nav */
            height: clamp(280px, calc(100dvh - 96px - 64px - 32px - 48px - 88px), 520px);
            min-height: 280px;
            flex-shrink: 0;
            background: #f8f8f8;
            border: 1px solid #EDEDED;
            border-radius: 8px;
            overflow: hidden;
        }

        body.drawing-page .drawing-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* Actions: nút Clear & Save */
        body.drawing-page .drawing-actions {
            position: static;
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        body.drawing-page .drawing-action-button {
            box-sizing: border-box;
            flex: 1 1 0;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 0 16px;
            height: 48px;
            border-radius: 36px;
            font-family: 'Noto Sans', sans-serif;
            font-weight: 600;
            font-size: 16px;
            line-height: 20px;
            color: #132322;
            cursor: pointer;
        }

        body.drawing-page .drawing-action-button-clear {
            background: #ffffff;
            border: 1px solid #30CEA7;
        }

        body.drawing-page .drawing-action-button-save {
            border: none;
            background: linear-gradient(306.85deg, #28CE9C 4.97%, #6AC9FF 90.05%);
        }

        /* Bottom nav */
        body.drawing-page .bottom-nav {
            display: flex;
            position: static;
            margin-top: auto;
            width: 100%;
            height: 64px;
            background: #ffffff;
            border-top: 1px solid #EDEDED;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 10;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        body.drawing-page .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #132322;
            text-decoration: none;
            font-size: 12px;
            gap: 4px;
            cursor: pointer;
            position: relative;
        }

        body.drawing-page .nav-item i {
            font-size: 24px;
            color: #132322;
        }

        body.drawing-page .nav-item span { color: #132322; }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 430px  (iPhone Plus, Pixel 6…)
           Khớp với @media (max-width: 430px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 430px) {

            body.drawing-page .drawing-mobile-header {
                padding-left: 16px;
                padding-right: 16px;
            }

            body.drawing-page .drawing-main {
                gap: 12px;
                padding: 12px 16px 88px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 22px;
                line-height: 30px;
            }

            body.drawing-page .drawing-blueprint {
                height: clamp(300px, calc(100dvh - 96px - 64px - 30px - 46px - 88px), 480px);
                min-height: 300px;
                max-height: 480px;
            }

            body.drawing-page .drawing-action-button {
                height: 46px;
                font-size: 15px;
            }

            body.drawing-page .bottom-nav {
                height: 64px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 400px  (Galaxy S24, Pixel 7a…)
           Khớp với @media (max-width: 400px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 400px) {

            body.drawing-page .drawing-main {
                gap: 10px;
                padding: 10px 14px 84px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 21px;
                line-height: 29px;
            }

            body.drawing-page .drawing-blueprint {
                height: clamp(280px, calc(100dvh - 96px - 64px - 28px - 44px - 84px), 460px);
                min-height: 280px;
                max-height: 460px;
            }

            body.drawing-page .drawing-action-button {
                height: 44px;
                font-size: 14px;
                padding: 0 14px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 375px  (iPhone SE 3, iPhone 12 mini…)
           Khớp với @media (max-width: 375px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 375px) {

            body.drawing-page .drawing-mobile-header {
                padding-left: 14px;
                padding-right: 14px;
            }

            body.drawing-page .drawing-main {
                padding-left: 14px;
                padding-right: 14px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 21px;
                line-height: 28px;
            }

            body.drawing-page .drawing-blueprint {
                height: clamp(260px, calc(100dvh - 96px - 64px - 28px - 44px - 80px), 440px);
                min-height: 260px;
                max-height: 440px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 360px  (Galaxy A / mid-range Android)
           Khớp với @media (max-width: 360px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 360px) {

            body.drawing-page .drawing-mobile-header {
                height: 80px;
                padding-top: 22px;
                padding-left: 12px;
                padding-right: 12px;
            }

            body.drawing-page .drawing-mobile-brand {
                font-size: 16px;
            }

            body.drawing-page .drawing-main {
                gap: 10px;
                padding: 10px 12px 84px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 20px;
                line-height: 28px;
            }

            body.drawing-page .drawing-blueprint {
                width: min(336px, 100%);
                height: clamp(240px, calc(100dvh - 80px - 56px - 28px - 42px - 84px), 420px);
                min-height: 240px;
                max-height: 420px;
            }

            body.drawing-page .drawing-actions {
                gap: 10px;
            }

            body.drawing-page .drawing-action-button {
                height: 42px;
                font-size: 14px;
                padding: 0 14px;
            }

            body.drawing-page .bottom-nav {
                height: 56px;
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
            }

            body.drawing-page .nav-item {
                font-size: 11px;
                gap: 2px;
            }

            body.drawing-page .nav-item i {
                font-size: 22px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 359px  (nhỏ hơn 360px — Galaxy A01, Nokia…)
           Khớp với @media (max-width: 359px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 359px) {

            body.drawing-page .drawing-mobile-header {
                height: 76px;
                padding-top: 20px;
                padding-left: 12px;
                padding-right: 12px;
            }

            body.drawing-page .drawing-mobile-brand {
                font-size: 15px;
            }

            body.drawing-page .drawing-main {
                gap: 10px;
                padding: 10px 12px 80px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 19px;
                line-height: 26px;
            }

            body.drawing-page .drawing-blueprint {
                width: 100%;
                height: clamp(220px, calc(100dvh - 76px - 56px - 26px - 42px - 80px), 400px);
                min-height: 220px;
                max-height: 400px;
            }

            body.drawing-page .drawing-actions {
                gap: 10px;
                justify-content: center;
            }

            body.drawing-page .drawing-action-button {
                flex: 1;
                height: 42px;
                font-size: 13px;
                padding: 0 12px;
            }

            body.drawing-page .bottom-nav {
                height: 56px;
            }

            body.drawing-page .nav-item {
                font-size: 11px;
            }

            body.drawing-page .nav-item i {
                font-size: 20px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT ≤ 280px  (Galaxy Fold ngoài, thiết bị rất nhỏ)
           Khớp với @media (max-width: 280px) style.css
        ══════════════════════════════════════════ */
        @media screen and (max-width: 280px) {

            body.drawing-page .drawing-mobile-header {
                height: 68px;
                padding-top: 16px;
                padding-left: 10px;
                padding-right: 10px;
            }

            body.drawing-page .drawing-mobile-brand {
                font-size: 14px;
            }

            body.drawing-page .drawing-main {
                gap: 8px;
                padding: 8px 10px 72px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 17px;
                line-height: 24px;
            }

            body.drawing-page .drawing-blueprint {
                width: 100%;
                height: clamp(180px, calc(100dvh - 68px - 52px - 24px - 38px - 72px), 340px);
                min-height: 180px;
                max-height: 340px;
            }

            body.drawing-page .drawing-actions {
                gap: 8px;
            }

            body.drawing-page .drawing-action-button {
                height: 38px;
                font-size: 12px;
                padding: 0 10px;
                border-radius: 24px;
            }

            body.drawing-page .bottom-nav {
                height: 52px;
                padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            }

            body.drawing-page .nav-item {
                font-size: 10px;
                gap: 2px;
            }

            body.drawing-page .nav-item i {
                font-size: 18px;
            }
        }


        /* ══════════════════════════════════════════
           BREAKPOINT 768px–1023px  (Tablet)
           Khớp với @media (min-width: 768px) and (max-width: 1023px) style.css
           Shell mở rộng, canvas lớn hơn
        ══════════════════════════════════════════ */
        @media screen and (min-width: 768px) and (max-width: 1023px) {

            body.drawing-page {
                align-items: flex-start;
                justify-content: center;
            }

            body.drawing-page .drawing-shell {
                max-width: 600px;
                width: 100%;
            }

            body.drawing-page .drawing-mobile-header {
                height: 72px;
                padding: 0 40px;
                justify-content: flex-start;
                border-bottom: 1px solid #EDEDED;
            }

            body.drawing-page .drawing-mobile-brand {
                font-size: 20px;
            }

            body.drawing-page .drawing-main {
                gap: 20px;
                padding: 24px 40px 100px;
            }

            body.drawing-page .drawing-page-title {
                font-size: 30px;
                line-height: 40px;
            }

            body.drawing-page .drawing-blueprint {
                width: 100%;
                height: clamp(380px, calc(100dvh - 72px - 72px - 60px - 60px - 100px), 600px);
                min-height: 380px;
                max-height: 600px;
                border-radius: 12px;
            }

            body.drawing-page .drawing-actions {
                gap: 16px;
                justify-content: flex-start;
            }

            body.drawing-page .drawing-action-button {
                flex: 0 0 auto;
                width: auto;
                min-width: 120px;
                height: 52px;
                font-size: 16px;
                padding: 0 32px;
            }

            body.drawing-page .bottom-nav {
                height: 72px;
                padding: 0 15%;
                padding-bottom: calc(0px + env(safe-area-inset-bottom));
            }

            body.drawing-page .nav-item i {
                font-size: 26px;
            }

            body.drawing-page .nav-item {
                font-size: 13px;
            }
        }

    </style>
</head>
<body class="drawing-page">
    <div class="drawing-shell">
        <header class="drawing-mobile-header">
            <div class="drawing-mobile-brand"><strong>My Demo</strong> <span>App</span></div>
        </header>

        <main class="drawing-main">
            <div class="drawing-blueprint-wrapper">
                <h1 class="drawing-page-title">Drawing</h1>

                <section class="drawing-blueprint" aria-label="Drawing canvas">
                    <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
                </section>
            </div>

            <div class="drawing-actions" aria-label="Drawing actions">
                <button class="drawing-action-button drawing-action-button-clear" id="drawing-clear" type="button">Clear</button>
                <button class="drawing-action-button drawing-action-button-save" id="drawing-save" type="button">Save</button>
            </div>
        </main>

        <nav class="bottom-nav drawing-bottom-nav" aria-label="Mobile navigation">
            <a href="./catalog.html" class="nav-item">
                <i class="fa-solid fa-store"></i>
                <span>Catalog</span>
            </a>
            <a href="./my-cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
            <div class="nav-item" onclick="toggleMenu('app')">
                <i class="fa-solid fa-bars"></i>
                <span>Menu</span>
            </div>
        </nav>
    </div>

    <script src="../script/menu.js"></script>
    <script src="../script/drawing.js"></script>
</body>
</html>
