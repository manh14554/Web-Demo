<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Ensure the blueprint wrapper never overflows on narrow phones (<400 px).
           The JS reads wrapper.clientWidth to derive a per-device cell size, so
           keeping the wrapper at 100% of its parent is enough — no fixed widths. */
        .drawing-blueprint-wrapper {
            width: 100%;
            box-sizing: border-box;
            overflow: hidden; /* belt-and-suspenders: prevents horizontal scroll */
        }

        /* The <section> itself gets its exact pixel width/height set by JS,
           but we still want it to be a block that doesn't bust out of the wrapper. */
        .drawing-blueprint {
            display: block;
            max-width: 100%;
            box-sizing: border-box;
        }

        /* The <canvas> must never be wider than its container on tiny screens. */
        .drawing-canvas {
            display: block;
            max-width: 100%;
            touch-action: none; /* prevents scroll-interference while drawing */
        }
    </style>
</head>
<body class="drawing-page">
    <div class="drawing-shell">
        <header class="drawing-mobile-header">
            <div class="drawing-mobile-brand"><strong>My Demo</strong> <span>App</span></div>
        </header>

        <main class="drawing-main">
            <h1 class="drawing-page-title">Drawing</h1>
            <div class="drawing-blueprint-wrapper">
                <section class="drawing-blueprint" aria-label="Drawing canvas">
                    <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
                </section>
            </div>

            <div class="drawing-actions" aria-label="Drawing actions">
                <button class="drawing-action-button drawing-action-button-clear" id="drawing-clear" type="button">Clear</button>
                <button class="drawing-action-button drawing-action-button-save" id="drawing-save" type="button">Save</button>
            </div>
        </main>

        <nav class="bottom-nav drawing-bottom-nav" aria-label="Mobile navigation">
            <a href="../index.html" class="nav-item">
                <i class="fa-solid fa-store"></i>
                <span>Catalog</span>
            </a>
            <a href="../cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
            <div class="nav-item" onclick="toggleMenu('app')">
                <i class="fa-solid fa-bars"></i>
                <span>Menu</span>
            </div>
        </nav>
    </div>

    <script src="../script/menu.js"></script>
    <script src="../script/drawing.js"></script>
</body>
</html>
