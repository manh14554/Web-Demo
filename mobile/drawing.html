<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body.drawing-page .drawing-blueprint-wrapper {
            display: inline-flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            overflow: hidden !important;
            padding: 0 !important;
        }

        body.drawing-page .drawing-main {
            align-items: center !important;
        }

        body.drawing-page .drawing-blueprint-wrapper .drawing-page-title {
            position: static !important;
            width: auto !important;
            left: auto !important;
            top: auto !important;
            height: auto !important;
            margin: 0 0 12px 0 !important;
            padding: 0 !important;
            font-family: 'Noto Sans', sans-serif !important;
            font-weight: 700 !important;
            font-size: 24px !important;
            line-height: 32px !important;
            letter-spacing: 0.02em !important;
            color: #132322 !important;
        }

        body.drawing-page .drawing-canvas {
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body class="drawing-page">
    <div class="drawing-shell">
        <header class="drawing-mobile-header">
            <div class="drawing-mobile-brand"><strong>My Demo</strong> <span>App</span></div>
        </header>

        <main class="drawing-main">
            <div class="drawing-blueprint-wrapper">
                <h1 class="drawing-page-title">Drawing</h1>

                <section class="drawing-blueprint" aria-label="Drawing canvas">
                    <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
                </section>
            </div>

            <div class="drawing-actions" aria-label="Drawing actions">
                <button class="drawing-action-button drawing-action-button-clear" id="drawing-clear" type="button">Clear</button>
                <button class="drawing-action-button drawing-action-button-save" id="drawing-save" type="button">Save</button>
            </div>
        </main>

        <nav class="bottom-nav drawing-bottom-nav" aria-label="Mobile navigation">
            <a href="../index.html" class="nav-item">
                <i class="fa-solid fa-store"></i>
                <span>Catalog</span>
            </a>
            <a href="../cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
            <div class="nav-item" onclick="toggleMenu('app')">
                <i class="fa-solid fa-bars"></i>
                <span>Menu</span>
            </div>
        </nav>
    </div>

    <script src="../script/menu.js"></script>
    <script src="../script/drawing.js"></script>
</body>
</html>
