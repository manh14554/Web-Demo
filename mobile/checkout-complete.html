<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Out: Complete</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="check-out-complete-page">
    <div class="check-out-complete-mobile-shell">
        <header class="app-header">
            <div class="app-header-inner">
                <div class="app-header-brand"><strong>My Demo</strong> <span>App</span></div>
            </div>
        </header>

        <main class="check-out-complete-mobile-main">
            <div class="check-out-complete-mobile-bg" aria-hidden="true">
                <span class="check-out-complete-shape shape-1"></span>
                <span class="check-out-complete-shape shape-2"></span>
                <span class="check-out-complete-shape shape-3"></span>
            </div>

            <div class="check-out-complete-mobile-content">
                <i class="bi bi-check2-circle check-out-complete-mobile-icon" aria-hidden="true"></i>
                <h1 class="check-out-complete-mobile-title">Checkout complete</h1>
                <p class="check-out-complete-mobile-copy">
                    Thank you for your order. Your order has been dispatched and will arrive as fast as the pony gallops!
                </p>
                <button type="button" class="check-out-complete-mobile-button" onclick="window.location.href='./catalog.html'">
                    Continue Shopping
                </button>
            </div>
        </main>

        <nav class="bottom-nav check-out-complete-mobile-nav" aria-label="Mobile navigation">
            <a href="./catalog.html" class="nav-item">
                <i class="fa-solid fa-store"></i>
                <span>Catalog</span>
            </a>
            <a href="./my-cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
                <span class="nav-badge" id="check-out-complete-nav-badge">0</span>
            </a>
            <div class="nav-item" onclick="toggleMenu('app')">
                <i class="fa-solid fa-bars"></i>
                <span>Menu</span>
            </div>
        </nav>
    </div>

    <script src="./script/cart.js"></script>
    <script src="./script/menu.js"></script>
    <script src="./script/check-out-complete.js"></script>
</body>
</html>
