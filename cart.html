<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-left">
            <div class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>  
                <ul class="menu-list" id="menu">
                    <li><a href="./index.html">Product</a></li>
                    <li><a href="./cart.html">Shopping Cart</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="./login.html">Logout</a></li>
                </ul>  
        </div>
        <div class="header-center">
            <a href="./index.html" class="logo">Swag <span>Labs</span></a>
        </div>
        <div class="header-right">
            <div class="shopping-cart">
                <a href="./cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>
    </header>
    <div class="cart-title">
            <h2 >Your Cart</h2>
        </div>
    <main class="site-main-cart">
        <div class="main-cart-qty-desc">
            <span class="cart-qty-col">QTY</span>
            <span class="cart-desc-col">Description</span>
            <span class="cart-action-col"></span>
        </div>

        <div id="cart-container" class="cart-items-list"></div>

        <!-- Template for cart item -->
        <template id="cart-item-template">
            <div class="cart-item">
                <div class="cart-item-qty" data-qty></div>
                <div class="cart-item-info">
                    <div class="cart-item-name" data-name></div>
                    <div class="cart-item-desc" data-description></div>
                    <div class="cart-item-bottom"> 
                        <div class="cart-item-price" data-price></div>
                        <button class="btn-remove" data-remove-btn>Remove</button>
                    </div>
                </div>
            </div>
        </template>

        <div class="cart-summary">
            <div class="summary-content">
                <div class="summary-buttons">   
                    <button class="btn-checkout" onclick="checkout()">Checkout</button>
                    <button class="btn-continue" onclick="window.location.href='./index.html'">Continue Shopping</button>
                </div>
            </div>
        </div>
    </main>
    
    <site-footer class="site-footer">
        <ul class="footer-link">
            <li><a href="#"><i class="fa-brands fa-twitter"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-facebook-f"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-linkedin-in"></i></a></li>
        </ul>
        <div class="footer-copyright">
            © 2026 Swag Labs. All Rights Reserved. Terms of Service | Privacy Policy
        </div>
    </site-footer>
    <script src="./script/cart.js"></script>
    <script src="./script/product.js"></script>

    <script>
        renderCart();
    </script>
</body>
</html>
