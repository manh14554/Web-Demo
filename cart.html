<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="cart-page">
    <header class="site-header">
        <div class="header-left">
            <div class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
            <ul class="menu-list" id="menu">
                <li><a href="./index.html">Product</a></li>
                <li><a href="./cart.html">Shopping Cart</a></li>
                <li><a href="#">About</a></li>
                <li><a href="./login.html">Logout</a></li>
            </ul>
        </div>
        <div class="header-center">
            <a href="./index.html" class="logo">Swag <span>Labs</span></a>
        </div>
        <div class="header-right">
            <div class="shopping-cart">
                <a href="./cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>
    </header>

    <main class="site-main-cart">
        <div class="cart-desktop-layout">
            <div class="cart-title">
                <h2>Your Cart</h2>
            </div>
            <div class="main-content-wrapper">
                <div class="main-cart-qty-desc">
                    <span class="cart-qty-col">QTY</span>
                    <span class="cart-desc-col">Description</span>
                    <span class="cart-action-col"></span>
                </div>

                <div id="cart-container" class="cart-items-list"></div>

                <template id="cart-item-template">
                    <div class="cart-item">
                        <div class="cart-item-qty" data-qty></div>
                        <div class="cart-item-info">
                            <div class="cart-item-name" data-name></div>
                            <div class="cart-item-desc" data-description></div>
                            <div class="cart-item-bottom">
                                <div class="cart-item-price" data-price></div>
                                <button class="btn-remove" data-remove-btn>Remove</button>
                            </div>
                        </div>
                    </div>
                </template>

                <div class="cart-summary">
                    <div class="summary-content">
                        <div class="summary-buttons">
                            <button class="btn-checkout" onclick="checkout()">Checkout</button>
                            <button class="btn-continue" onclick="window.location.href='./index.html'">Continue Shopping</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <ul class="footer-link">
            <li><a href="#"><i class="fa-brands fa-twitter"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-facebook-f"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-linkedin-in"></i></a></li>
        </ul>
        <div class="footer-copyright">
            &copy; 2026 Swag Labs. All Rights Reserved. Terms of Service | Privacy Policy
        </div>
    </footer>

    <script src="./script/cart.js"></script>
    <script src="./script/product.js"></script>
    <script src="./script/menu.js"></script>
    <script>
        function updateMobileCartView() {
            const isMobile = window.matchMedia("(max-width: 768px)").matches;
            const cartItems = getCartItems();
            const emptyView = document.querySelector(".cart-mobile-empty");
            const filledView = document.querySelector(".cart-mobile-filled");
            const list = document.getElementById("mobile-cart-list");
            const template = document.getElementById("cart-mobile-card-template");
            const totalItems = document.getElementById("mobile-total-items");
            const totalPrice = document.getElementById("mobile-total-price");
            const badge = document.getElementById("cart-nav-badge");

            if (!emptyView || !filledView || !list || !template || !totalItems || !totalPrice || !badge) {
                return;
            }

            if (!isMobile) {
                emptyView.style.display = "none";
                filledView.style.display = "none";
                badge.style.display = "none";
                list.innerHTML = "";
                return;
            }

            const totalQuantity = cartItems.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const grandTotal = subtotal * 1.1; 

            badge.textContent = totalQuantity;
            badge.style.display = totalQuantity > 0 ? "flex" : "none";

            list.innerHTML = "";

            if (cartItems.length === 0) {
                emptyView.style.display = "flex";
                filledView.style.display = "none";
                return;
            }

            emptyView.style.display = "none";
            filledView.style.display = "flex";
            totalItems.textContent = `${totalQuantity} items`;
            totalPrice.textContent = `$${grandTotal.toFixed(2)}`;

            cartItems.forEach((item, index) => {
                const card = template.content.cloneNode(true);
                const image = card.querySelector("[data-image]");
                const name = card.querySelector("[data-name]");
                const qty = card.querySelector("[data-qty]");
                const price = card.querySelector("[data-price]");
                const decreaseBtn = card.querySelector('[data-action="decrease"]');
                const increaseBtn = card.querySelector('[data-action="increase"]');
                const removeBtn = card.querySelector('[data-action="remove"]');

                if (image) {
                    image.src = item.image;
                    image.alt = item.name;
                }
                if (name) {
                    name.textContent = item.name;
                }
                if (qty) {
                    qty.textContent = item.quantity;
                }
                if (price) {
                    price.textContent = `$${(item.price * item.quantity).toFixed(2)}`;
                }

                decreaseBtn.addEventListener("click", () => {
                    const items = getCartItems();
                    if (!items[index]) {
                        return;
                    }
                    items[index].quantity = Math.max(1, items[index].quantity - 1);
                    saveCartItems(items);
                    renderCart();
                    updateMobileCartView();
                });

                increaseBtn.addEventListener("click", () => {
                    const items = getCartItems();
                    if (!items[index]) {
                        return;
                    }
                    items[index].quantity += 1;
                    saveCartItems(items);
                    renderCart();
                    updateMobileCartView();
                });

                removeBtn.addEventListener("click", () => {
                    const items = getCartItems();
                    items.splice(index, 1);
                    saveCartItems(items);
                    renderCart();
                    updateMobileCartView();
                });

                list.appendChild(card);
            });
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", () => {
                renderCart();
                updateMobileCartView();
                window.addEventListener("resize", updateMobileCartView);
            });
        } else {
            renderCart();
            updateMobileCartView();
            window.addEventListener("resize", updateMobileCartView);
        }
    </script>
</body>
</html>
