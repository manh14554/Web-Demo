<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
        <header class="primary-header">
        <div class="header-left">
            <div class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>  
                <ul class="menu-list" id="menu">
                    <li><a href="#">Product</a></li>
                    <li><a href="/cart.html">Shopping Cart</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="/login.html">Logout</a></li>
                </ul>  
        </div>
        <div class="header-center">
            <a href="/" class="logo">Swag <span>Labs</span></a>
        </div>
        <div class="header-right">
            <div class="shopping-cart">
                <a href="/cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
            <a href="/login.html" class="btn">Đăng nhập</a>
        </div>
    </header>

    <main class="cart-page-wrapper">
        <h3 class="cart-title">Your Cart</h3>

        <div class="cart-header">
            <span class="qty-col">QTY</span>
            <span class="desc-col">Description</span>
            <span class="action-col"></span>
        </div>

        <div id="cart-container" class="cart-items-list"></div>

        <div class="cart-summary">
            <div class="summary-content">
                <div class="summary-buttons">   
                    <button class="btn-checkout" onclick="checkout()">Checkout</button>
                    <button class="btn-continue" onclick="window.location.href='/'">Continue Shopping</button>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <ul class="social-link">
            <a href="#"><i class="fi fi-brands-twitter"></i></a>
            <a href="#"><i class="fi fi-brands-facebook"></i></a>
            <a href="#"><i class="fi fi-brands-instagram"></i></a>
        </ul>
        <div class="footer-copy">
            © 2026 Swag Labs. All Rights Reserved.
        </div>
    </footer>
    <script src="./script/cart.js"></script>
    <script src="./script/product.js"></script>

    <script>
        renderCart();
    </script>
</body>
</html>
