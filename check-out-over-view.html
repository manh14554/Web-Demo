<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Out: Overview</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <header class="primary-header">
        <div class="header-left">
            <div class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>  
                <ul class="menu-list" id="menu">
                    <li><a href="/index.html">Product</a></li>
                    <li><a href="/cart.html">Shopping Cart</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="/login.html">Logout</a></li>
                </ul>  
        </div>
        <div class="header-center">
            <a href="/" class="logo">Swag <span>Labs</span></a>
        </div>
        <div class="header-right">
            <div class="shopping-cart">
                <a href="/cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>
    </header>

    <div class="checkoutheader">
        <h2>Checkout: Overview</h2>
    </div>

    <main class="overview-wrapper">
        <div class="overview-content">
            <div class="items-section">
                <div class="cart-list-header">
                    <span class="qty-label">QTY</span>
                    <span class="desc-label">Description</span>
                </div>
                <div id="overview-items" class="overview-items"></div>
            </div>

            <div class="summary-info">
                <div class="info-group">
                    <h3>Payment Information</h3>
                    <p>SwagCard ending with 1337</p>
                </div>

                <div class="info-group">
                    <h3>Shipping Information</h3>
                    <p id="shipping-user-info">Free Pony Express Delivery!</p>
                </div>

                <div class="info-group price-summary">
                    <h3>Price Total</h3>
                    <p>Item total: <span id="item-total">$0.00</span></p>
                    <p>Tax: <span id="tax-total">$0.00</span></p>
                    <div class="total-line">
                        Total: <span id="grand-total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="button-group-overview">
            <button type="button" class="btn-finish" onclick="handleFinish()">Finish</button>
            <button type="button" class="btn-cancel-overview" onclick="handleCancel()">Cancel</button>
        </div>
    </main>

    <footer class="footer">
        <ul class="social-link">
            <li><a href="#"><i class="bi bi-twitter"></i></a></li>
            <li><a href="#"><i class="bi bi-facebook"></i></a></li>
            <li><a href="#"><i class="bi bi-instagram"></i></a></li>   
        </ul>
        <div class="footer-copy">
            © 2026 Swag Labs. All Rights Reserved.
        </div>
    </footer>

    <script src="./script/cart.js"></script>
    <script src="./script/product.js"></script>
    <script>
        function renderOverview() {
            const cartItems = getCartItems();
            const container = document.getElementById("overview-items");

            if (!container) {
                return;
            }

            

            if (cartItems.length === 0) {
                container.innerHTML = "<p>Giỏ hàng trống</p>";
                return;
            }

            let html = "";
            let itemTotal = 0;

            cartItems.forEach((item) => {
                itemTotal += item.price * item.quantity;
                html += `
                    <div class="overview-item">
                        <div class="item-qty">${item.quantity}</div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <p class="cart-item-desc">${item.description || "Product description"}</p>
                            <div class="cart-item-prices">
                                <span>$${item.price.toFixed(2)}</span>
                            </div>
                        </div>
                        
                    </div>
                `;
            });

            container.innerHTML = html;

            const taxAmount = itemTotal * 0.1;
            const grandTotal = itemTotal + taxAmount;

            document.getElementById("item-total").innerText = "$" + itemTotal.toFixed(2);
            document.getElementById("tax-total").innerText = "$" + taxAmount.toFixed(2);
            document.getElementById("grand-total").innerText = "$" + grandTotal.toFixed(2);
        }

        function handleFinish() {
            localStorage.removeItem("myCart");
            localStorage.removeItem("checkoutInfo");
            window.location.href = "/check-out-complete.html";
        }

        function handleCancel() {
            window.location.href = "/cart.html";
        }

        renderOverview();
    </script>
</body>
</html>
